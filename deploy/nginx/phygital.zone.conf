# Phygital — Nginx config for phygital.zone
# SSL: sudo certbot --nginx -d phygital.zone -d www.phygital.zone -d ar.phygital.zone

upstream phygital_api {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name phygital.zone www.phygital.zone ar.phygital.zone;
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name phygital.zone www.phygital.zone;

    ssl_certificate /etc/letsencrypt/live/phygital.zone/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/phygital.zone/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/phygital/app/client/dist;
    index index.html;

    client_max_body_size 20m;

    location /api/ {
        proxy_pass http://phygital_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location /r/ {
        proxy_pass http://phygital_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name ar.phygital.zone;

    ssl_certificate /etc/letsencrypt/live/phygital.zone/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/phygital.zone/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/phygital/app/ar-engine/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
