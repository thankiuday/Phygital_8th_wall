# HTTP-only bootstrap before Let's Encrypt certs exist.

upstream phygital_api {
    server 127.0.0.1:5000;
    keepalive 32;
}

server {
    listen 80;
    listen [::]:80;
    server_name phygital.zone www.phygital.zone;

    root /var/www/phygital/app/client/dist;
    index index.html;

    location /api/ {
        proxy_pass http://phygital_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /r/ {
        proxy_pass http://phygital_api;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name ar.phygital.zone;

    root /var/www/phygital/app/ar-engine/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
