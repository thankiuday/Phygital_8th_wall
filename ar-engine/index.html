<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen" />
    <title>Phygital — AR Experience</title>

    <!--
      CDN LOADING ORDER (important — do not reorder):

      1. Three.js — global THREE for MindAR (see version note below)
      2. MindAR Image — compiler (window.MINDAR.IMAGE.Compiler)
      3. MindAR Three — tracker (window.MINDAR.IMAGE.MindARThree)

      mind-ar 1.2.2+ ships ESM-only prod builds; classic <script> tags then throw
      "Cannot use import statement outside a module". Pin to 1.1.5 (webpack UMD).
      GSAP is bundled via Vite from npm (main.js sets window.gsap).
    -->

    <!-- Three r149 — avoids three.min.js deprecation warnings from r150+; pairs with mind-ar 1.1.x -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>

    <!-- MindAR 1.1.5 — last release line with browser-safe single-file prod bundles -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image-three.prod.js"></script>

    <style>
      /* ------------------------------------------------------------------ */
      /* Reset                                                                */
      /* ------------------------------------------------------------------ */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      /* ------------------------------------------------------------------ */
      /* AR stack (#ar-root)                                                  */
      /* MindAR injects: WebGL canvas, CSS3D canvas, then <video>.            */
      /* It sets video to z-index: -2, which can fall behind the root on     */
      /* some WebKit stacks. Use explicit 0 / 1 / 2 layers instead.         */
      /* ------------------------------------------------------------------ */
      #ar-root {
        width: 100vw;
        height: 100vh;
        min-height: 100vh;
        min-height: 100dvh;
        position: relative;
        z-index: 0;
        isolation: isolate;
        overflow: hidden;
        background: #000;
      }

      #ar-root > video {
        position: absolute !important;
        z-index: 0 !important;
      }

      /* WebGL first, CSS3D second (MindAR constructor order) */
      #ar-root > canvas:nth-of-type(1) {
        position: absolute;
        z-index: 1;
      }

      #ar-root > canvas:nth-of-type(2) {
        position: absolute;
        z-index: 2;
      }

      /* ------------------------------------------------------------------ */
      /* MindAR default UI — position:absolute on body; use fixed + z-index   */
      /* so it always sits above #ar-root but below our loading overlay.     */
      /* ------------------------------------------------------------------ */
      body > .mindar-ui-overlay {
        position: fixed !important;
        left: 0 !important;
        right: 0 !important;
        top: 0 !important;
        bottom: 0 !important;
        z-index: 10 !important;
        pointer-events: none;
      }

      /* ------------------------------------------------------------------ */
      /* Loading overlay                                                      */
      /* ------------------------------------------------------------------ */
      #ar-loading-overlay {
        position: fixed;
        inset: 0;
        z-index: 10000;
        background: radial-gradient(ellipse at center, #0f0a1e 0%, #000 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease;
      }

      /* Loader: spinning ring around a static logo (ring spins, logo does not) */
      .ar-logo-wrap {
        position: relative;
        width: 88px;
        height: 88px;
        margin-bottom: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .ar-logo-ring {
        position: absolute;
        inset: 0;
        border-radius: 50%;
        border: 3px solid transparent;
        border-top-color: #7c3aed;
        border-right-color: #06b6d4;
        animation: ar-loader-spin 1.2s linear infinite;
        pointer-events: none;
      }
      .ar-logo-ring::after {
        content: '';
        position: absolute;
        inset: 10px;
        border-radius: 50%;
        border: 2px solid transparent;
        border-bottom-color: rgba(124, 58, 237, 0.45);
        border-left-color: rgba(6, 182, 212, 0.45);
        animation: ar-loader-spin 0.85s linear infinite reverse;
      }
      @keyframes ar-loader-spin {
        to { transform: rotate(360deg); }
      }
      .ar-logo-mark {
        position: relative;
        z-index: 1;
        width: 44px;
        height: 44px;
        object-fit: contain;
        pointer-events: none;
        user-select: none;
      }

      #ar-loading-content {
        width: 100%;
        max-width: 300px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      /* Progress bar */
      .ar-progress-track {
        width: 240px;
        height: 4px;
        background: #ffffff15;
        border-radius: 99px;
        overflow: hidden;
      }
      #ar-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #7c3aed, #06b6d4);
        border-radius: 99px;
        transition: width 0.3s ease;
      }
      #ar-progress-label {
        font-size: 12px;
        color: #a78bfa;
        text-align: center;
        min-height: 18px;
        transition: opacity 0.2s;
      }

      .ar-hint {
        font-size: 11px;
        color: #ffffff40;
        text-align: center;
        padding: 0 24px;
        line-height: 1.6;
      }

      /* ------------------------------------------------------------------ */
      /* Error state (hidden by default)                                      */
      /* ------------------------------------------------------------------ */
      #ar-error-box {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 0 32px;
        text-align: center;
      }
      .ar-error-icon {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: #7c3aed22;
        border: 2px solid #7c3aed55;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
      }
      #ar-error-message {
        font-size: 18px;
        font-weight: 600;
        color: #fff;
      }
      #ar-error-sub {
        font-size: 13px;
        color: #ffffff60;
        line-height: 1.5;
      }
      .ar-retry-btn {
        margin-top: 8px;
        padding: 10px 28px;
        border-radius: 99px;
        border: none;
        background: linear-gradient(135deg, #7c3aed, #4f46e5);
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.02em;
      }

      /* ------------------------------------------------------------------ */
      /* Custom scanning overlay — shows the image to point the camera at   */
      /* ------------------------------------------------------------------ */
      #ar-scanning-overlay {
        position: fixed;
        inset: 0;
        z-index: 15;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 14px;
        padding: max(16px, env(safe-area-inset-top)) 20px max(24px, env(safe-area-inset-bottom));
        pointer-events: none;
        background: rgba(0, 0, 0, 0.35);
      }
      #ar-scanning-overlay.hidden {
        display: none !important;
      }
      .ar-scan-title {
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.7);
        text-align: center;
      }
      .ar-scan-target-frame {
        position: relative;
        width: min(78vw, 320px);
        max-height: min(52vh, 420px);
        aspect-ratio: 1.6;
        border-radius: 16px;
        overflow: hidden;
        box-shadow:
          0 0 0 1px rgba(167, 139, 250, 0.35),
          0 0 0 2px rgba(255, 255, 255, 0.85),
          0 16px 48px rgba(0, 0, 0, 0.55);
        background: #111;
      }
      #ar-scan-target-img {
        display: block;
        width: 100%;
        height: 100%;
        object-fit: contain;
        background: #0a0a0a;
      }
      .ar-scan-corner {
        position: absolute;
        width: 28px;
        height: 28px;
        border: 3px solid #fff;
        opacity: 0.95;
      }
      .ar-scan-corner-tl { top: 8px; left: 8px; border-right: none; border-bottom: none; border-radius: 6px 0 0 0; }
      .ar-scan-corner-tr { top: 8px; right: 8px; border-left: none; border-bottom: none; border-radius: 0 6px 0 0; }
      .ar-scan-corner-bl { bottom: 8px; left: 8px; border-right: none; border-top: none; border-radius: 0 0 0 6px; }
      .ar-scan-corner-br { bottom: 8px; right: 8px; border-left: none; border-top: none; border-radius: 0 0 6px 0; }
      .ar-scan-line {
        position: absolute;
        left: 6%;
        right: 6%;
        height: 2px;
        background: linear-gradient(90deg, transparent, #a78bfa, #7c3aed, #a78bfa, transparent);
        box-shadow: 0 0 12px #7c3aed;
        animation: ar-scan-sweep 2.2s ease-in-out infinite;
        pointer-events: none;
      }
      @keyframes ar-scan-sweep {
        0%, 100% { top: 12%; opacity: 0.35; }
        50% { top: 82%; opacity: 1; }
      }
      .ar-scan-hint {
        max-width: 300px;
        text-align: center;
        font-size: 13px;
        line-height: 1.5;
        color: rgba(255, 255, 255, 0.82);
        text-shadow: 0 1px 8px rgba(0, 0, 0, 0.65);
      }
      .ar-scan-campaign {
        font-weight: 700;
        color: #c4b5fd;
      }
      #ar-scanning-overlay.mode-hidden {
        display: none !important;
      }

      /* Surface coaching overlay — translucent guide over live camera */
      .ar-surface-coaching {
        position: fixed;
        inset: 0;
        z-index: 45;
        display: flex;
        align-items: center;
        justify-content: center;
        pointer-events: none;
        transition: opacity 0.35s ease;
      }
      .ar-surface-coaching.state-hidden,
      .ar-surface-coaching.state-placed {
        opacity: 0;
        pointer-events: none;
      }
      .ar-surface-coaching.state-starting {
        pointer-events: auto;
        cursor: pointer;
      }
      .ar-surface-coaching.state-scanning,
      .ar-surface-coaching.state-ready {
        opacity: 1;
        pointer-events: none;
      }
      .ar-surface-coaching.state-ready {
        opacity: 0.55;
      }
      .ar-surface-coaching-vignette {
        position: absolute;
        inset: 0;
        background: radial-gradient(
          ellipse at center,
          rgba(2, 6, 23, 0.08) 0%,
          rgba(2, 6, 23, 0.22) 100%
        );
        pointer-events: none;
      }
      .ar-surface-coaching-content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 10px;
        max-width: min(88vw, 300px);
        text-align: center;
        padding: 20px;
      }
      .ar-surface-coaching-mark {
        width: 48px;
        height: 48px;
        object-fit: contain;
        opacity: 0.65;
        animation: ar-coaching-float 2.8s ease-in-out infinite;
        filter: drop-shadow(0 4px 12px rgba(124, 58, 237, 0.35));
      }
      @keyframes ar-coaching-float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-6px); }
      }
      .ar-surface-coaching-brand {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: rgba(255, 255, 255, 0.6);
      }
      .ar-surface-coaching-scan {
        position: relative;
        width: 120px;
        height: 4px;
        border-radius: 999px;
        background: rgba(167, 139, 250, 0.15);
        overflow: hidden;
      }
      .ar-surface-coaching-scan-line {
        position: absolute;
        inset: 0;
        background: linear-gradient(90deg, transparent, rgba(196, 181, 253, 0.9), transparent);
        animation: ar-coaching-sweep 2s ease-in-out infinite;
      }
      @keyframes ar-coaching-sweep {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      .ar-surface-coaching-message {
        font-size: 14px;
        font-weight: 600;
        line-height: 1.45;
        color: rgba(255, 255, 255, 0.88);
        text-shadow: 0 1px 8px rgba(0, 0, 0, 0.55);
      }
      .ar-surface-coaching-tap {
        font-size: 12px;
        color: rgba(196, 181, 253, 0.85);
        font-weight: 600;
      }

      /* In-AR hint when hit-test reticle is visible */
      #ar-surface-place-hint {
        position: fixed;
        left: 50%;
        bottom: max(96px, env(safe-area-inset-bottom, 12px) + 80px);
        transform: translateX(-50%) translateY(8px);
        z-index: 55;
        max-width: min(92vw, 320px);
        padding: 10px 16px;
        border-radius: 999px;
        border: 1px solid rgba(167, 139, 250, 0.45);
        background: rgba(12, 8, 24, 0.78);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        color: rgba(255, 255, 255, 0.92);
        font-size: 13px;
        font-weight: 600;
        text-align: center;
        pointer-events: none;
        opacity: 0;
        transition: opacity 0.25s ease, transform 0.25s ease;
      }
      #ar-surface-place-hint.visible {
        opacity: 1;
        transform: translateX(-50%) translateY(0);
      }

      /* WebXR dom-overlay root — in-session UI composited over immersive AR */
      #ar-dom-overlay {
        position: fixed;
        inset: 0;
        z-index: 50;
        pointer-events: none;
      }
      #ar-dom-overlay #ar-controls,
      #ar-dom-overlay #ar-hub-toggle,
      #ar-dom-overlay #ar-link-dock {
        pointer-events: auto;
      }

      /* ------------------------------------------------------------------ */
      /* AR UX overlays (controls, buffer spinner, watermark)                */
      /* Sit above MindAR canvases (z-index 1-2), below loading (10000).    */
      /* ------------------------------------------------------------------ */

      /* Glass pill with play/pause, mute, fullscreen (hidden by default) */
      #ar-controls {
        position: fixed;
        left: 50%;
        bottom: max(28px, env(safe-area-inset-bottom, 12px) + 16px);
        transform: translate(-50%, 8px);
        z-index: 50;
        display: flex;
        align-items: center;
        gap: 4px;
        padding: 6px 8px;
        border-radius: 999px;
        background: rgba(12, 8, 24, 0.72);
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        border: 1px solid rgba(167, 139, 250, 0.2);
        box-shadow:
          0 8px 32px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.06);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.35s ease, transform 0.35s ease;
      }
      #ar-controls.visible {
        opacity: 1;
        transform: translate(-50%, 0);
        pointer-events: auto;
      }
      #ar-controls .ar-ctrl {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: none;
        background: transparent;
        color: #fff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        transition: background-color 0.15s ease, transform 0.1s ease;
      }
      #ar-controls .ar-ctrl:hover,
      #ar-controls .ar-ctrl:focus-visible {
        background: rgba(255, 255, 255, 0.08);
        outline: none;
      }
      #ar-controls .ar-ctrl:active {
        transform: scale(0.94);
      }

      /* Centered buffering spinner (hidden by default) */
      #ar-buffer {
        position: fixed;
        inset: 0;
        z-index: 40;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.2s ease;
      }
      #ar-buffer.visible {
        opacity: 1;
      }
      .ar-buffer-ring {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.12);
        border-top-color: rgba(255, 255, 255, 0.85);
        animation: ar-spin 0.9s linear infinite;
        filter: drop-shadow(0 4px 18px rgba(0, 0, 0, 0.45));
      }
      @keyframes ar-spin { to { transform: rotate(360deg); } }

      /* "Powered by" watermark — fades to a faint label after 3 s */
      #ar-watermark {
        position: fixed;
        right: 14px;
        bottom: max(12px, env(safe-area-inset-bottom, 6px));
        z-index: 30;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 10px;
        font-weight: 600;
        letter-spacing: 0.04em;
        color: rgba(255, 255, 255, 0.85);
        text-shadow: 0 1px 4px rgba(0, 0, 0, 0.55);
        pointer-events: none;
        animation: ar-fade-watermark 3s ease-out forwards;
      }
      .ar-watermark-mark {
        width: 16px;
        height: 16px;
        object-fit: contain;
        filter: drop-shadow(0 1px 2px rgba(0, 0, 0, 0.45));
      }
      @keyframes ar-fade-watermark {
        0%   { opacity: 1; }
        70%  { opacity: 1; }
        100% { opacity: 0.4; }
      }

      /* ------------------------------------------------------------------ */
      /* Bottom link dock — visible only while video plays                   */
      /* ------------------------------------------------------------------ */
      #ar-link-dock {
        position: fixed;
        left: 50%;
        bottom: calc(max(28px, env(safe-area-inset-bottom, 12px) + 16px) + 72px);
        transform: translateX(-50%);
        z-index: 50;
        width: min(92vw, 360px);
        padding: 0 max(8px, env(safe-area-inset-left, 8px));
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        display: flex;
        justify-content: center;
      }
      #ar-link-dock.visible {
        opacity: 1;
        pointer-events: auto;
      }
      #ar-link-dock-inner {
        display: flex;
        align-items: center;
        flex-wrap: nowrap;
        gap: 10px;
        width: fit-content;
        max-width: 100%;
        margin: 0 auto;
        padding: 8px 12px;
        border-radius: 999px;
        background: rgba(12, 8, 24, 0.78);
        backdrop-filter: blur(16px) saturate(180%);
        -webkit-backdrop-filter: blur(16px) saturate(180%);
        border: 1px solid rgba(167, 139, 250, 0.22);
        box-shadow:
          0 8px 28px rgba(0, 0, 0, 0.4),
          inset 0 1px 0 rgba(255, 255, 255, 0.07);
      }
      #ar-link-dock-inner.layout-single,
      #ar-link-dock-inner.layout-even {
        justify-content: center;
      }
      #ar-link-dock-inner.layout-many {
        justify-content: flex-start;
        overflow-x: auto;
        scrollbar-width: none;
        -ms-overflow-style: none;
        border-radius: 20px;
      }
      #ar-link-dock-inner.layout-many::-webkit-scrollbar {
        display: none;
      }
      .ar-link-btn {
        flex-shrink: 0;
        width: 42px;
        height: 42px;
        border-radius: 50%;
        border: 1px solid rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(8px);
        -webkit-backdrop-filter: blur(8px);
        box-shadow:
          0 4px 14px rgba(0, 0, 0, 0.35),
          inset 0 1px 0 rgba(255, 255, 255, 0.12);
        display: inline-flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        padding: 0;
        opacity: 0;
        transition: box-shadow 0.15s ease;
      }
      .ar-link-btn:active {
        transform: scale(0.92);
      }
      .ar-link-btn:focus-visible {
        outline: 2px solid rgba(167, 139, 250, 0.9);
        outline-offset: 2px;
      }

      /* Hub switch — compact top-right pill */
      #ar-hub-toggle {
        position: fixed;
        top: max(12px, env(safe-area-inset-top, 12px));
        right: max(12px, env(safe-area-inset-right, 12px));
        left: auto;
        transform: none;
        z-index: 51;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        min-height: 40px;
        max-width: calc(100vw - 24px);
        padding: 8px 14px;
        border-radius: 999px;
        border: 1px solid rgba(124, 58, 237, 0.5);
        background: rgba(12, 8, 24, 0.75);
        color: #ddd6fe;
        font-size: 13px;
        font-weight: 600;
        text-decoration: none;
        backdrop-filter: blur(14px) saturate(160%);
        -webkit-backdrop-filter: blur(14px) saturate(160%);
        box-shadow: 0 6px 20px rgba(0, 0, 0, 0.35);
        cursor: pointer;
        transition: background-color 0.15s ease, transform 0.1s ease;
      }
      #ar-hub-toggle span {
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        max-width: 160px;
      }
      #ar-hub-toggle:hover,
      #ar-hub-toggle:focus-visible {
        background: rgba(124, 58, 237, 0.28);
        outline: none;
      }
      #ar-hub-toggle:active {
        transform: scale(0.97);
      }
      #ar-hub-toggle.visible {
        opacity: 1;
        pointer-events: auto;
      }
    </style>
  </head>

  <body>
    <!-- Custom MindAR scanning UI — target preview image inside the frame -->
    <div id="ar-scanning-overlay" class="hidden" aria-hidden="true">
      <p class="ar-scan-title" id="ar-scan-title">Scan this image</p>
      <div class="ar-scan-target-frame">
        <img id="ar-scan-target-img" alt="Point your camera at this card" crossorigin="anonymous" />
        <span class="ar-scan-corner ar-scan-corner-tl" aria-hidden="true"></span>
        <span class="ar-scan-corner ar-scan-corner-tr" aria-hidden="true"></span>
        <span class="ar-scan-corner ar-scan-corner-bl" aria-hidden="true"></span>
        <span class="ar-scan-corner ar-scan-corner-br" aria-hidden="true"></span>
        <span class="ar-scan-line" aria-hidden="true"></span>
      </div>
      <p class="ar-scan-hint">
        <span id="ar-scan-hint-prefix">Point your camera at your card</span>
        <span class="ar-scan-campaign" id="ar-scan-campaign-name"></span>
      </p>
    </div>

    <!-- WebXR dom-overlay — watermark, controls, coaching, place hint during immersive AR -->
    <div id="ar-dom-overlay">
      <p id="ar-surface-place-hint" aria-hidden="true">
        Tap the purple ring to place the hologram
      </p>
    </div>

    <!-- AR canvas container — MindARThree injects <canvas> here -->
    <div id="ar-root"></div>

    <!-- ------------------------------------------------------------------ -->
    <!-- Loading overlay                                                      -->
    <!-- ------------------------------------------------------------------ -->
    <div id="ar-loading-overlay">

      <!-- Loading content (progress bar, etc.) -->
      <div id="ar-loading-content">
        <div class="ar-logo-wrap">
          <div class="ar-logo-ring" aria-hidden="true"></div>
          <img src="/phygital-mark.png" alt="Phygital" class="ar-logo-mark" width="44" height="44" />
        </div>

        <div class="ar-progress-track">
          <div id="ar-progress-bar"></div>
        </div>
        <div id="ar-progress-label">Initialising…</div>

        <p class="ar-hint" id="ar-loading-hint">
          Point your camera at the business card once the AR experience is ready.
        </p>
      </div>

      <!-- Error state (swapped in by loadingScreen.js) -->
      <div id="ar-error-box">
        <div class="ar-error-icon">⚠️</div>
        <p id="ar-error-message">Something went wrong.</p>
        <p id="ar-error-sub"></p>
        <button class="ar-retry-btn" onclick="location.reload()">Try Again</button>
      </div>

    </div>

    <!-- Main module (loaded after CDN scripts are ready) -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
