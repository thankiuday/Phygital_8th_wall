<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-fullscreen" />
    <title>Phygital8ThWall — AR Experience</title>

    <!--
      CDN LOADING ORDER (important — do not reorder):

      1. Three.js — global THREE for MindAR (see version note below)
      2. MindAR Image — compiler (window.MINDAR.IMAGE.Compiler)
      3. MindAR Three — tracker (window.MINDAR.IMAGE.MindARThree)

      mind-ar 1.2.2+ ships ESM-only prod builds; classic <script> tags then throw
      "Cannot use import statement outside a module". Pin to 1.1.5 (webpack UMD).
      GSAP is bundled via Vite from npm (main.js sets window.gsap).
    -->

    <!-- Three r149 — avoids three.min.js deprecation warnings from r150+; pairs with mind-ar 1.1.x -->
    <script src="https://cdn.jsdelivr.net/npm/three@0.149.0/build/three.min.js"></script>

    <!-- MindAR 1.1.5 — last release line with browser-safe single-file prod bundles -->
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image.prod.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.1.5/dist/mindar-image-three.prod.js"></script>

    <style>
      /* ------------------------------------------------------------------ */
      /* Reset                                                                */
      /* ------------------------------------------------------------------ */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      }

      /* ------------------------------------------------------------------ */
      /* AR canvas container — MindAR injects its canvas here               */
      /* ------------------------------------------------------------------ */
      #ar-root {
        width: 100vw;
        height: 100vh;
        position: relative;
        overflow: hidden;
      }

      /* ------------------------------------------------------------------ */
      /* Loading overlay                                                      */
      /* ------------------------------------------------------------------ */
      #ar-loading-overlay {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: radial-gradient(ellipse at center, #0f0a1e 0%, #000 100%);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: opacity 0.5s ease;
      }

      /* Animated logo ring */
      .ar-logo-ring {
        width: 90px;
        height: 90px;
        border-radius: 50%;
        border: 3px solid transparent;
        border-top-color: #7c3aed;
        border-right-color: #06b6d4;
        animation: spin 1.2s linear infinite;
        margin-bottom: 28px;
        position: relative;
      }
      .ar-logo-ring::after {
        content: '';
        position: absolute;
        inset: 8px;
        border-radius: 50%;
        border: 2px solid transparent;
        border-bottom-color: #7c3aed55;
        border-left-color: #06b6d455;
        animation: spin 0.8s linear infinite reverse;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* Brand mark inside the ring */
      .ar-logo-inner {
        position: absolute;
        inset: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.05em;
        color: #a78bfa;
      }

      #ar-loading-content {
        width: 100%;
        max-width: 300px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 16px;
      }

      .ar-brand {
        font-size: 22px;
        font-weight: 700;
        color: #fff;
        letter-spacing: -0.01em;
      }
      .ar-brand span { color: #7c3aed; }

      /* Progress bar */
      .ar-progress-track {
        width: 240px;
        height: 4px;
        background: #ffffff15;
        border-radius: 99px;
        overflow: hidden;
      }
      #ar-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #7c3aed, #06b6d4);
        border-radius: 99px;
        transition: width 0.3s ease;
      }
      #ar-progress-label {
        font-size: 12px;
        color: #a78bfa;
        text-align: center;
        min-height: 18px;
        transition: opacity 0.2s;
      }

      .ar-hint {
        font-size: 11px;
        color: #ffffff40;
        text-align: center;
        padding: 0 24px;
        line-height: 1.6;
      }

      /* ------------------------------------------------------------------ */
      /* Error state (hidden by default)                                      */
      /* ------------------------------------------------------------------ */
      #ar-error-box {
        display: none;
        flex-direction: column;
        align-items: center;
        gap: 12px;
        padding: 0 32px;
        text-align: center;
      }
      .ar-error-icon {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: #7c3aed22;
        border: 2px solid #7c3aed55;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 24px;
      }
      #ar-error-message {
        font-size: 18px;
        font-weight: 600;
        color: #fff;
      }
      #ar-error-sub {
        font-size: 13px;
        color: #ffffff60;
        line-height: 1.5;
      }
      .ar-retry-btn {
        margin-top: 8px;
        padding: 10px 28px;
        border-radius: 99px;
        border: none;
        background: linear-gradient(135deg, #7c3aed, #4f46e5);
        color: #fff;
        font-size: 14px;
        font-weight: 600;
        cursor: pointer;
        letter-spacing: 0.02em;
      }

      /* ------------------------------------------------------------------ */
      /* MindAR scanning hint override — match brand colours                */
      /* ------------------------------------------------------------------ */
      .mindar-ui-overlay .mindar-ui-scanning > .scanline {
        background: linear-gradient(180deg, transparent, #7c3aed88) !important;
      }
    </style>
  </head>

  <body>
    <!-- AR canvas container — MindARThree injects <canvas> here -->
    <div id="ar-root"></div>

    <!-- ------------------------------------------------------------------ -->
    <!-- Loading overlay                                                      -->
    <!-- ------------------------------------------------------------------ -->
    <div id="ar-loading-overlay">

      <!-- Loading content (progress bar, etc.) -->
      <div id="ar-loading-content">
        <div class="ar-logo-ring">
          <div class="ar-logo-inner">AR</div>
        </div>

        <div class="ar-brand">Phygital<span>8</span>ThWall</div>

        <div class="ar-progress-track">
          <div id="ar-progress-bar"></div>
        </div>
        <div id="ar-progress-label">Initialising…</div>

        <p class="ar-hint">
          Point your camera at the business card<br />
          once the AR experience is ready.
        </p>
      </div>

      <!-- Error state (swapped in by loadingScreen.js) -->
      <div id="ar-error-box">
        <div class="ar-error-icon">⚠️</div>
        <p id="ar-error-message">Something went wrong.</p>
        <p id="ar-error-sub"></p>
        <button class="ar-retry-btn" onclick="location.reload()">Try Again</button>
      </div>

    </div>

    <!-- Main module (loaded after CDN scripts are ready) -->
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
