services:
  # ── Backend API ────────────────────────────────────────────────
  - type: web
    name: phygital8thwall-api
    runtime: node
    rootDir: server
    buildCommand: npm install --production=false
    startCommand: node index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: CLIENT_URL
        value: https://phygital8thwall-client.onrender.com
    healthCheckPath: /health

  # ── Frontend Static Site ───────────────────────────────────────
  - type: web
    name: phygital8thwall-client
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://phygital8thwall-api.onrender.com/api
      - key: VITE_APP_URL
        value: https://phygital8thwall-client.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # ── AR Engine Static Site ──────────────────────────────────────
  - type: web
    name: phygital8thwall-ar
    runtime: static
    rootDir: ar-engine
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://phygital8thwall-api.onrender.com/api
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
