<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary meta (overridden per-page by react-helmet-async) -->
    <title>Phygital — physical meets digital experiences</title>
    <meta name="description" content="Phygital QR link hubs, AR storytelling, analytics, and more — bridge physical prints and digital experiences in one platform." />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="color-scheme" content="dark light" />
    <meta name="application-name" content="Phygital" />

    <!-- Open Graph baseline (per-page values injected by SEOHead) -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Phygital — physical meets digital experiences" />
    <meta property="og:description" content="QR link hubs, AR storytelling, and analytics — bridge physical prints and digital experiences." />

    <!-- Twitter Card baseline -->
    <meta name="twitter:card"  content="summary_large_image" />
    <meta name="twitter:title" content="Phygital — physical meets digital experiences" />
    <meta name="twitter:image" content="/phygital-logo.png" />

    <!-- PWA / Mobile -->
    <meta name="mobile-web-app-capable"          content="yes" />
    <meta name="apple-mobile-web-app-capable"    content="yes" />
    <meta name="apple-mobile-web-app-title"      content="Phygital" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- App icons (PNG matches navbar mark; SVG for crisp tabs) -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" href="/phygital-mark.png" sizes="512x512" />
    <link rel="apple-touch-icon" href="/phygital-logo.png" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- DNS prefetch for CDNs used by ar-engine -->
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
