<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary meta (overridden per-page by react-helmet-async) -->
    <title>Phygital — AR Business Card Platform</title>
    <meta name="description" content="Turn any business card into an immersive holographic AR experience. Create, share, and track your WebAR campaigns in minutes." />
    <meta name="theme-color" content="#7c3aed" />
    <meta name="color-scheme" content="dark light" />
    <meta name="application-name" content="Phygital" />

    <!-- Open Graph baseline (per-page values injected by SEOHead) -->
    <meta property="og:type"        content="website" />
    <meta property="og:title"       content="Phygital — AR Business Card Platform" />
    <meta property="og:description" content="Turn any business card into an immersive holographic AR experience." />
    <meta property="og:url"         content="https://phygital8thwall.com" />
    <meta property="og:site_name"   content="Phygital" />
    <meta property="og:image"       content="https://phygital8thwall.com/phygital-logo.png" />

    <!-- Twitter Card baseline -->
    <meta name="twitter:card"  content="summary_large_image" />
    <meta name="twitter:title" content="Phygital — AR Business Card Platform" />
    <meta name="twitter:image" content="https://phygital8thwall.com/phygital-logo.png" />

    <!-- PWA / Mobile -->
    <meta name="mobile-web-app-capable"          content="yes" />
    <meta name="apple-mobile-web-app-capable"    content="yes" />
    <meta name="apple-mobile-web-app-title"      content="Phygital" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />

    <!-- App icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/phygital-logo.png" />

    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preconnect" href="https://res.cloudinary.com" />

    <!-- DNS prefetch for CDNs used by ar-engine -->
    <link rel="dns-prefetch" href="https://cdn.jsdelivr.net" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
